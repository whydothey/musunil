name: post-deploy

on:
  workflow_dispatch:
    inputs:
      verification_mode:
        description: "Verification to run after Render deploy"
        required: true
        default: "final-gate"
        type: choice
        options:
          - "final-gate"
          - "web-deploy"
      web_base_url:
        description: "Deployed Web URL"
        required: true
        default: "https://musunil.com"
      api_base_url:
        description: "Deployed API URL"
        required: true
        default: "https://api.musunil.com"
      expected_api_base_url:
        description: "Expected apiBaseUrl in Web config.js"
        required: true
        default: "https://api.musunil.com"
      expected_commit_sha:
        description: "Expected deployed Git SHA. Leave blank to use this workflow commit."
        required: false
        default: ""
      render_api_dns_target:
        description: "Render API DNS target for api.musunil.com, hostname only. Required for final-gate strict DNS when Render API token is unavailable."
        required: false
        default: ""
      github_environment:
        description: "GitHub Environment exposing post-deploy secrets. Use production unless secrets are repository-level only."
        required: false
        default: "production"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.github_environment }}
    env:
      RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
      MUSUNIL_RENDER_API_TOKEN: ${{ secrets.MUSUNIL_RENDER_API_TOKEN }}
      MUSUNIL_INTERNAL_API_KEY: ${{ secrets.MUSUNIL_INTERNAL_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Verify Render Web build contract
        run: pnpm check:web-render-build-command
      - name: Prepare verification env
        env:
          INPUT_WEB_BASE_URL: ${{ inputs.web_base_url }}
          INPUT_API_BASE_URL: ${{ inputs.api_base_url }}
          INPUT_EXPECTED_API_BASE_URL: ${{ inputs.expected_api_base_url }}
          INPUT_EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha }}
          INPUT_RENDER_API_DNS_TARGET: ${{ inputs.render_api_dns_target }}
        run: |
          expected_commit="$INPUT_EXPECTED_COMMIT_SHA"
          if [ -z "$expected_commit" ]; then
            expected_commit="$GITHUB_SHA"
          fi
          render_api_dns_target="$(printf '%s' "$INPUT_RENDER_API_DNS_TARGET" | tr -d '[:space:]')"
          {
            echo "MUSUNIL_WEB_BASE_URL=$INPUT_WEB_BASE_URL"
            echo "MUSUNIL_API_BASE_URL=$INPUT_API_BASE_URL"
            echo "MUSUNIL_EXPECTED_API_BASE_URL=$INPUT_EXPECTED_API_BASE_URL"
            echo "MUSUNIL_EXPECTED_COMMIT_SHA=$expected_commit"
            echo "MUSUNIL_STRICT_WEB_HEADERS=1"
            if [ -n "$render_api_dns_target" ]; then
              echo "MUSUNIL_RENDER_API_DNS_TARGET=$render_api_dns_target"
            fi
          } >> "$GITHUB_ENV"
      - name: Verify Web deploy
        if: ${{ inputs.verification_mode == 'web-deploy' }}
        run: pnpm check:web-deploy
      - name: Verify final launch gate
        if: ${{ inputs.verification_mode == 'final-gate' }}
        run: pnpm launch:final-gate
