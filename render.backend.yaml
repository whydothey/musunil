# Backend-only Blueprint for the existing manually managed musunil-web site.
# In Render, set Blueprint Path to render.backend.yaml.
services:
  - type: keyvalue
    name: musunil-redis
    region: singapore
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: musunil-api
    runtime: docker
    region: singapore
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: pnpm db:migrate
    healthCheckPath: /ready
    maxShutdownDelaySeconds: 30
    envVars:
      - key: MUSUNIL_RUNTIME_ENV
        value: production
      - key: MUSUNIL_INTERNAL_API_KEY
        generateValue: true
      - key: MUSUNIL_USER_TOKEN_SECRET
        generateValue: true
      - key: MUSUNIL_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: musunil-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: musunil-redis
          property: connectionString
      - key: MUSUNIL_USER_INPUTS_FILE_PATH
        value: /etc/secrets/musunil.user-inputs.yaml

  - type: cron
    name: musunil-ops-scheduler
    runtime: docker
    region: singapore
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "*/5 * * * *"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: pnpm ops:scheduler
    envVars:
      - key: MUSUNIL_RUNTIME_ENV
        value: production
      - key: MUSUNIL_API_HOSTPORT
        fromService:
          type: web
          name: musunil-api
          property: hostport
      - key: MUSUNIL_INTERNAL_API_KEY
        fromService:
          type: web
          name: musunil-api
          envVarKey: MUSUNIL_INTERNAL_API_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: musunil-postgres
          property: connectionString
      - key: MUSUNIL_USER_INPUTS_FILE_PATH
        value: /etc/secrets/musunil.user-inputs.yaml

databases:
  - name: musunil-postgres
    databaseName: musunil
    user: musunil
    region: singapore
    plan: basic-256mb
    ipAllowList: []
