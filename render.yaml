services:
  - type: keyvalue
    name: musunil-redis
    region: singapore
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: musunil-api
    runtime: docker
    region: singapore
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: pnpm db:migrate
    healthCheckPath: /ready
    maxShutdownDelaySeconds: 30
    envVars:
      - key: MUSUNIL_RUNTIME_ENV
        value: production
      - key: MUSUNIL_INTERNAL_API_KEY
        generateValue: true
      - key: MUSUNIL_USER_TOKEN_SECRET
        generateValue: true
      - key: MUSUNIL_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: musunil-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: musunil-redis
          property: connectionString
      - key: MUSUNIL_USER_INPUTS_FILE_PATH
        value: /etc/secrets/musunil.user-inputs.yaml

  - type: web
    name: musunil-web
    runtime: static
    branch: main
    autoDeployTrigger: checksPass
    buildCommand: pnpm install --frozen-lockfile && pnpm build:web-static:render
    staticPublishPath: apps/web/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-store
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; connect-src 'self' https:; img-src 'self' data: blob: https:; media-src 'self' https: blob:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.portone.io; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src 'self' blob:"
      - path: /*
        name: Permissions-Policy
        value: camera=(self), microphone=(), geolocation=(self)
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: MUSUNIL_RUNTIME_ENV
        value: production

  - type: cron
    name: musunil-ops-scheduler
    runtime: docker
    region: singapore
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    schedule: "*/5 * * * *"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: pnpm ops:scheduler
    envVars:
      - key: MUSUNIL_RUNTIME_ENV
        value: production
      - key: MUSUNIL_API_HOSTPORT
        fromService:
          type: web
          name: musunil-api
          property: hostport
      - key: MUSUNIL_INTERNAL_API_KEY
        fromService:
          type: web
          name: musunil-api
          envVarKey: MUSUNIL_INTERNAL_API_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: musunil-postgres
          property: connectionString
      - key: MUSUNIL_USER_INPUTS_FILE_PATH
        value: /etc/secrets/musunil.user-inputs.yaml

databases:
  - name: musunil-postgres
    databaseName: musunil
    user: musunil
    region: singapore
    plan: basic-256mb
    ipAllowList: []
